<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>लोकसाहित्याची रूपरेखा - प्रकरण ५</title>
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@500;700&family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* Styling for the clickable words */
.dict-link { 
  color: #8B0000; 
  border-bottom: 2px dashed #b8964d; 
  cursor: help; 
  font-weight: bold; 
}

/* The Pop-up Box (Modal) */
#dict-modal { 
  display: none; 
  position: fixed; 
  top: 50%; 
  left: 50%; 
  transform: translate(-50%, -50%); 
  background: white; 
  padding: 30px; 
  border: 4px solid #b8964d; 
  z-index: 3000; 
  width: 80%; 
  max-width: 400px; 
  border-radius: 10px; 
  text-align: center;
  box-shadow: 0 0 50px rgba(0,0,0,0.5);
}

/* Dark background behind the pop-up */
#dict-overlay { 
  display: none; 
  position: fixed; 
  top: 0; 
  left: 0; 
  width: 100%; 
  height: 100%; 
  background: rgba(0,0,0,0.7); 
  z-index: 2999; 
}
    :root { --shahi-red: #8B0000; --gold: #b8964d; --bg: #fdfbf7; }
   <body>

<div class="header-nav">
  <span style="font-weight: bold; letter-spacing: 1px;">MIT ACADEMIC PORTAL</span>
  <button onclick="toggleLanguage()" style="background:white; color:var(--shahi-red); border:none; padding:5px 15px; cursor:pointer; font-weight:bold; border-radius:4px; font-family: 'Khand';">English / मराठी</button>
</div>

<div class="manuscript" id="page-content">
  </div>

<script>
  const academicData = {
    mr: {
      title: "लोकसाहित्याची रूपरेखा",
      subtitle: "प्रकरण ५: परीकथा आणि अद्भुतकथा",
      intro: "परीकथेची लक्षणे आपण पहिल्या प्रकरणांत पाहिलीच आहेत. या प्रकरणांत मुख्यतः पुढील मुद्द्यांचा विचार करायचा आहे: (१) भारतीय परीकथा आणि ऐतिहासिक पर्याय (२) भारतीय परीकथांतील अद्भुतत्व.",
      kinnarFull: "किन्नर हे एक महिना स्त्री व एक महिना पुरुष होतात, असाही समज पुराणांत आढळतो. जातकात किन्नरांची जात पुष्पप्रेमी आणि प्रणयासक्त अशी दर्शविलेली आहे. एके ठिकाणी एक रात्रभर वियुक्त झालेले किन्नर-युगल दुसऱ्या दिवशी सकाळी भेट झाल्यावर एकमेकांना मिठी मारून, एकमेकांची चुंबने घेत आळीपाळीने रडत व हसत ती दोघे कित्येक वर्षे त्याच स्थितीत राहिली.",
      jainFull: "जैन दिगंबर पंथात तीर्थंकरांचे रक्षक यक्ष असतात. ऋषभाचा यक्ष गोमुख (सुवर्णवर्णी, वाहन हत्ती) आणि यक्षिणी अप्रतिचक्रा (आठ हात, वाहन गरुड). पार्श्वनाथाची सेविका यक्षिणी पद्मावती हिचा वर्ण सोनेरी असून रथ सर्पाचा आहे."
      // All other content remains stored here...
    },
    en: {
      title: "Outline of Folklore",
      subtitle: "Chapter 5: Fairy Tales",
      intro: "Exploration of Indian fairy tales and supernatural elements.",
      kinnarFull: "Kinnars change gender monthly. Jataka tales describe them as romantic; one story tells of a couple reuniting after a night apart and embracing for years.",
      jainFull: "Jain Tirthankaras have guardians like Gomukh and Padmavati (golden complexion, serpent chariot)."
    }
  };

  let currentLang = 'mr';

  function renderPage() {
    const d = academicData[currentLang];
    document.getElementById('page-content').innerHTML = `
      <header style="text-align: center; margin-bottom: 50px;">
        <h1>${d.title}</h1>
        <p style="font-size: 1.6rem; font-weight: bold; color: var(--gold);">${d.subtitle}</p>
      </header>

      <div style="text-align: center; margin: 30px 0; background: #fff; padding: 15px; border: 1px solid #ddd;">
        <img src="parikatha1.jpeg" alt="[ERROR: parikatha1.jpeg NOT FOUND IN FOLDER]" style="max-width: 45%; height: auto; border:1px solid red;">
        <img src="parikatha2.jpeg" alt="[ERROR: parikatha2.jpeg NOT FOUND IN FOLDER]" style="max-width: 45%; height: auto; margin-left: 5px; border:1px solid red;">
        <p style="color:var(--shahi-red); font-weight:bold;">चित्र १ व २: ऐतिहासिक परंपरा</p>
      </div>

      <p>${d.intro}</p>
      
      <div style="text-align: center; margin: 30px 0; background: #fff; padding: 15px; border: 1px solid #ddd;">
        <img src="parikatha3.jpeg" alt="[ERROR: parikatha3.jpeg NOT FOUND IN FOLDER]" style="max-width: 80%; height: auto; border:1px solid red;">
        <p style="color:var(--shahi-red); font-weight:bold;">चित्र ३: अतिमानवी योनी</p>
      </div>

      <p>${d.kinnarFull}</p>
      <p>${d.jainFull}</p>

      <div style="text-align: center; margin: 30px 0; background: #fff; padding: 15px; border: 1px solid #ddd;">
        <img src="dantkatha1.jpeg" alt="[ERROR: dantkatha1.jpeg NOT FOUND IN FOLDER]" style="max-width: 45%; height: auto; border:1px solid red;">
        <img src="dantkatha2.jpeg" alt="[ERROR: dantkatha2.jpeg NOT FOUND IN FOLDER]" style="max-width: 45%; height: auto; margin-left: 5px; border:1px solid red;">
        <p style="color:var(--shahi-red); font-weight:bold;">चित्र ४ व ५: लोककथा वारसा</p>
      </div>
    `;
  }

  function toggleLanguage() {
    currentLang = (currentLang === 'mr') ? 'en' : 'mr';
    renderPage();
  }

  renderPage();
</script>

</body>
</html>
