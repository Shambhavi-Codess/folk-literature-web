      <footer style="text-align:center; margin-top:50px; border-top:1px solid #ccc; padding-top:20px;">
        <p>© २०२६ | MIT ADT University, Pune</p>
      </footer>
    `;
  }

  function toggleLanguage() {
    currentLang = (currentLang === 'mr') ? 'en' : 'mr';
    renderPage();
  }

  function openDict(key) {
    const dictData = {
      'variants': 'ऐतिहासिक पर्याय: एकाच कथेचे विविध संदर्भ.',
      'panchatantra': 'पंचतंत्र: नीती शिकवणारा प्राचीन ग्रंथ.'
    };
    document.getElementById('dict-text').innerText = dictData[key];
    document.getElementById('dict-overlay').style.display = 'block';
    document.getElementById('dict-modal').style.display = 'block';
  }

  function closeDict() {
    document.getElementById('dict-overlay').style.display = 'none';
    document.getElementById('dict-modal').style.display = 'none';
  }

  // RUN INITIAL LOAD
  renderPage();
</script>

</body>
</html>
