<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>लोकसाहित्याची रूपरेखा - अधिकृत शैक्षणिक पोर्टल</title>
  <link href="https://fonts.googleapis.com/css2?family=Khand:wght@500;700&family=Noto+Serif+Devanagari:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --shahi-red: #8B0000; --gold: #b8964d; --parchment: #fdfbf7; }
    body { font-family: 'Noto Serif Devanagari', serif; background-color: #e5e5e5; margin: 0; padding: 0; color: #1a1a1a; line-height: 1.8; }
    
    /* UNIVERSAL HEADER */
    .header-nav { background: var(--shahi-red); color: white; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; border-bottom: 4px solid var(--gold); }
    .nav-btn { background: var(--gold); border: none; color: white; padding: 8px 15px; font-weight: bold; cursor: pointer; border-radius: 4px; font-family: 'Khand', sans-serif; transition: 0.3s; }
    .nav-btn:hover { background: #967b3f; }

    /* NATIVE DICTIONARY MODAL (Works on Yahoo/All) */
    #dict-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; }
    #dict-modal { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 30px; border: 5px double var(--gold); z-index: 2001; width: 90%; max-width: 500px; text-align: center; border-radius: 8px; }
    .dict-word { color: var(--shahi-red); border-bottom: 2px dashed var(--gold); cursor: help; font-weight: bold; }

    .manuscript { max-width: 950px; margin: 30px auto; background: var(--parchment); padding: 60px; border: 1px solid #d1b272; box-shadow: 0 0 40px rgba(0,0,0,0.15); }
    h1, h2, h3 { font-family: 'Khand', sans-serif; color: var(--shahi-red); }
    p { text-align: justify; font-size: 1.25rem; margin-bottom: 25px; }
    
    .img-frame { text-align: center; margin: 45px 0; background: #fff; padding: 15px; border: 1px solid #ccc; }
    .img-frame img { max-width: 100%; height: auto; border: 1px solid #eee; }
    .img-label { display: block; margin-top: 12px; font-weight: bold; color: var(--shahi-red); font-family: 'Khand', sans-serif; }

    footer { text-align: center; padding: 40px; color: #666; border-top: 1px solid #ccc; font-family: 'Khand', sans-serif; }
  </style>
</head>
<body>

<div class="header-nav">
  <span style="font-weight: bold;">MIT ACADEMIC REPOSITORY</span>
  <button class="nav-btn" onclick="toggleLanguage()">भाषा बदला / TOGGLE ENGLISH</button>
</div>

<div id="dict-overlay" onclick="closeDict()"></div>
<div id="dict-modal">
  <h2 id="dict-title" style="margin-top:0;">संदर्भ (Dictionary)</h2>
  <p id="dict-text" style="font-size: 1.3rem;"></p>
  <button class="nav-btn" onclick="closeDict()">CLOSE</button>
</div>

<div class="manuscript" id="main-content">
  </div>

<script>
  let lang = 'mr';

  const content = {
    mr: {
      title: "लोकसाहित्याची रूपरेखा",
      subtitle: "प्रकरण पाचवे - परीक्षा किंवा अनुभवकथा",
      intro: "परीक्षेची कसोटी आपण पाहिल्या प्रकारात पाहिली आहे. परीक्षेत विचारलेल्या प्रश्नांमुळे विद्यार्थ्यांच्या ज्ञानाची कसोटी होते. परंतु अनुभवकथांमध्ये एखाद्या व्यक्तीच्या अनुभवावर आधारित कथा सांगितल्या जातात. या प्रकारात मुख्यतः पुढील मुद्द्यांचा समावेश होतो : (१) भारतीय परीक्षा आणि ऐतिहासिक व्यक्ती, (२) व्यक्तींचे अनुभव, (३) त्यांचे वर्तमान जीवन, (४) वस्तूंचा विचार.",
      histTitle: "४ : ४ ऐतिहासिक व्यक्ती",
      histPara: "भारतीय संस्कृतीच्या प्राचीन परंपरा आणि भारतीय धार्मिक व सांस्कृतिक घटकांचा अभ्यास या प्रकरणात करण्यात येतो. इतिहासातील घटनांचा विचार करून त्या घटनांचा वर्तमानावर कसा परिणाम होतो याचा अभ्यास करणे महत्त्वाचे आहे. भारतातील अनेक ऐतिहासिक व्यक्तींनी समाजावर मोठा प्रभाव टाकला आहे. इतिहासात केवळ राजकीय घटना नाहीत, तर सामाजिक, आर्थिक, धार्मिक आणि सांस्कृतिक घटकांचाही अभ्यास केला जातो. इतिहास आपल्याला भूतकाळातील घटनांची माहिती देतो आणि वर्तमान समजून घेण्यास मदत करतो.",
      fullText: "वाङ्मयात, महाकाव्यात, बौद्ध, जैन व इतर कथासंग्रहात्मक वाङ्मयात विस्तारात बहुसंख्य अद्भुतकथांची प्रतिकृती कुठे ना कुठे तरी सापडते. परीकथा हा एक गुंतागुंतीचा गद्यप्रकार, किंवा गद्यपद्यमिश्रित <span class='dict-word' onclick='openDict(\"champu\")'>चंपूप्रकार</span> असून त्याचा आविष्कार परम गांभीर्याने भरलेला असतो. राजा विक्रमाचा दरबार हा पंचतंत्रातल्या वनराजाच्या सभेचे प्रतीक असते. ज्या ज्या प्रदेशांत प्राथमिक संस्कृतीशिवाय कुठलीही संस्कृती पोचली नाही, तिथे परीकथा आढळत नाहीत. उदा. मध्य आफ्रिकेतल्या निग्रो लोकांना परीकथा माहीत नाहीत. ऑस्ट्रेलियातल्याही अत्यंत रानटी लोकांत अद्भुतकथा नाहीत.",
      beingsTitle: ": २ : अतिमानवी योनी",
      beingsPara: "भारतीय अद्भुत कथांतल्या प्राचीनतम अतिमानवी योनी, यक्ष, गंधर्व, किन्नर, गुह्यक, राक्षस, विद्याधर व सर्प यांच्या आहेत. या सर्व अतिमानवी योनींपैकी यक्षांवर फक्त डॉ. आनंद कुमारस्वामी यांनी उत्कृष्ट स्वतंत्र ग्रंथ Yaksas हा लिहिला आहे. गंधर्व-किन्नरांबद्दल असे वाङ्मय फ्रेंच भाषेखेरीज अन्यत्र नाही. नागांविषयी मात्र विपुल वाङ्मय उपलब्ध आहे.",
      kinnarPara: "किन्नर हे एक महिना स्त्री व एक महिना पुरुष होतात, असाही समज पुराणांत आढळतो. जातकांत किन्नरांची जात पुष्पप्रेमी आणि प्रणयासक्त अशी दर्शविलेली आहे. एके ठिकाणी एक रात्रभर वियुक्त झालेले किन्नर-युगल दुसऱ्या दिवशी सकाळी भेट झाल्यावर एकमेकांना मिठी मारून कित्येक वर्षे त्याच स्थितीत रडत व हसत राहिले, असे वर्णन आहे.",
      rakshasTitle: "राक्षस आणि लोककथा बीजे",
      rakshasPara: "भारतीय लोककथांत राक्षसांच्या कथांतली मुख्य बीजे अशी आढळतात : (१) राक्षसाच्या घरी विस्तव असतो. (२) राक्षसाला मुली असतात ज्या नायकाला मदत करतात. (३) राक्षसिणी पिठे कांडतात. (४) राक्षसीण मानवाबरोबर लग्न करते. (५) राक्षस बलाढ्य असले तरी मूर्ख असतात.",
      jainPara: "जैन (दिगंबर पंथात) - तीर्थंकरांच्या प्रत्येकाच्या वेगवेगळ्या यक्ष-यक्षिणी असत. उदा. ऋषभाचा यक्ष गोमुख आणि यक्षिणी अप्रतिचक्रा. पार्श्वनाथाची सेविका यक्षिणी पद्मावती हिचा वर्ण सोनेरी असून रथ सर्पाचा आहे.",
      features: ["मायिक सिद्धी", "आकाशसंचार", "अदृश्य होणे", "कला-संगीत नैपुण्य", "मानवाशी संभोग", "मानवी अपत्ये", "पंखहीन उड्डाण", "रात्रिसंचार"]
    },
    en: {
      title: "Outline of Folklore",
      subtitle: "Chapter 5 - Examinations or Experience Stories",
      intro: "We examined tests in the previous section. While exams test a student's knowledge, experience stories are based on an individual's lived experiences. This includes: (1) Indian Exams and Historical Figures, (2) Personal Experiences, (3) Current Life, (4) Objects.",
      histTitle: "4.4 Historical Figures",
      histPara: "This study looks at ancient Indian traditions and cultural elements. Understanding how historical events shape the present is vital. History is not just politics; it is social, economic, and cultural. It helps us understand the present through the past.",
      fullText: "In literature, epics, and Buddhist/Jain texts, replicas of wonder-tales are found everywhere. Fairy tales are complex prose forms, often in <span class='dict-word' onclick='openDict(\"champu_en\")'>Champu style</span> (mixed prose/poetry), filled with seriousness. King Vikram's court represents the assembly of the Forest King in Panchatantra. In regions without advanced culture, like Central Africa or tribal Australia, these stories are absent.",
      beingsTitle: "2. Superhuman Beings",
      beingsPara: "The oldest superhuman beings are Yakshas, Gandharvas, Kinnars, Rakshasas, etc. Dr. Ananda Coomaraswamy wrote the definitive book 'Yaksas'. While French literature covers Gandharvas, vast literature exists on Nagas (Serpents).",
      kinnarPara: "In Puranas, Kinnars change gender monthly. Jataka tales describe them as romantic. One story tells of a Kinnar couple separated for a night; upon reuniting, they remained in an embrace, laughing and crying for years.",
      rakshasTitle: "Rakshasas and Folk Motifs",
      rakshasPara: "Main motifs: (1) Fire is found in their homes. (2) Daughters help the hero against the father. (3) Ogresses grind flour. (4) An Ogress marries a human. (5) They are powerful but foolish.",
      jainPara: "In Jainism, Tirthankaras have specific Yakshas. For Rishabha, it is Gomukh; for Parshvanatha, it is Padmavati, who has a golden complexion and a serpent chariot.",
      features: ["Mystical Powers", "Sky Travel", "Invisibility/Form-shifting", "Expertise in Arts", "Relations with Humans", "Human Offspring", "Flight without Wings", "Night Travel"]
    }
  };

  const dictionary = {
    'champu': 'चंपूप्रकार: गद्य आणि पद्य यांचे मिश्रण असलेले वाङ्मय.',
    'champu_en': 'Champu Style: A literary composition featuring a mix of prose and poetry.'
  };

  function render() {
    const l = content[lang];
    document.getElementById('main-content').innerHTML = `
      <h1>${l.title}</h1>
      <p style="text-align:center; font-weight:bold; color:var(--gold);">${l.subtitle}</p>
      
      <div class="img-frame"><img src="parikatha1.jpeg"><span class="img-label">IMAGE 1: HISTORICAL TRADITION</span></div>
      <p>${l.intro}</p>

      <h3>${l.histTitle}</h3>
      <p>${l.histPara}</p>

      <div class="img-frame"><img src="parikatha2.jpeg"><span class="img-label">IMAGE 2: FOLKLORE SCOPE</span></div>
      <p>${l.fullText}</p>

      <div class="img-frame"><img src="parikatha3.jpeg"><span class="img-label">IMAGE 3: SUPERHUMAN BEINGS</span></div>
      <h2>${l.beingsTitle}</h2>
      <p>${l.beingsPara}</p>
      <p>${l.kinnarPara}</p>

      <div class="img-frame"><img src="dantkatha1.jpeg"><span class="img-label">IMAGE 4: RAKSHASA MOTIFS</span></div>
      <h3>${l.rakshasTitle}</h3>
      <p>${l.rakshasPara}</p>

      <div class="img-frame"><img src="dantkatha2.jpeg"><span class="img-label">IMAGE 5: CULTURAL LEGACY</span></div>
      <p>${l.jainPara}</p>

      <h3>Characteristics:</h3>
      <ul>${l.features.map(f => `<li>${f}</li>`).join('')}</ul>
    `;
  }

  function toggleLanguage() { lang = (lang === 'mr') ? 'en' : 'mr'; render(); }
  function openDict(key) { document.getElementById('dict-text').innerText = dictionary[key]; document.getElementById('dict-overlay').style.display = 'block'; document.getElementById('dict-modal').style.display = 'block'; }
  function closeDict() { document.getElementById('dict-overlay').style.display = 'none'; document.getElementById('dict-modal').style.display = 'none'; }

  render();
</script>
</body>
</html>
